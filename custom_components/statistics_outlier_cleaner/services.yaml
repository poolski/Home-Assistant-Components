clean_outliers:
  name: Clean Outliers
  description: >
    Detect and fix outliers in a Home Assistant long-term statistic by
    directly correcting the recorder SQLite database.  Backs up affected rows
    before any mutation so the fix can be reversed with restore_fix.
  fields:
    statistic_id:
      name: Statistic ID
      description: The statistic to scan and fix (must support sum).
      required: true
      example: sensor.electricity_meter_energy
      selector:
        text:
    period:
      name: Period
      description: >
        Which data granularity to use.  "hybrid" (default) uses 5-minute rows
        where complete, falling back to hourly.
      default: hybrid
      selector:
        select:
          options:
            - hybrid
            - hour
            - 5minute
    method:
      name: Detection method
      description: >
        top_n: flag the N rows with the largest |change|.
        absolute: flag rows where |change| >= threshold.
        mad: flag rows whose modified z-score >= mad_factor (safest for automation).
      default: mad
      selector:
        select:
          options:
            - mad
            - absolute
            - top_n
    top_n:
      name: Top N
      description: Number of rows to flag (only used when method=top_n).
      default: 10
      selector:
        number:
          min: 1
          max: 100
          mode: box
    threshold:
      name: Threshold
      description: Minimum |change| to flag (only used when method=absolute).
      default: 0.0
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    mad_factor:
      name: MAD factor
      description: >
        Modified z-score threshold for the MAD method.
        6 = conservative (obvious spikes only), 3 = aggressive.
      default: 6.0
      selector:
        number:
          min: 0.1
          step: 0.1
          mode: box
    lookback_days:
      name: Lookback days
      description: How many days of history to scan (0 = all time).
      default: 0
      selector:
        number:
          min: 0
          mode: box
    replacement:
      name: Replacement change
      description: >
        The value the flagged row's change should be set to.  Default 0
        removes the spike entirely.
      default: 0.0
      selector:
        number:
          step: 0.001
          mode: box
    dry_run:
      name: Dry run
      description: >
        When true, compute what would be fixed but make no database changes.
        The result is logged at INFO level.
      default: false
      selector:
        boolean:

restore_fix:
  name: Restore Fix
  description: >
    Reverse a previous clean_outliers or apply_fix call by restoring the
    original database rows from the backup table.
  fields:
    fix_id:
      name: Fix ID
      description: The UUID returned by clean_outliers or apply_fix.
      required: true
      example: "3f2504e0-4f89-11d3-9a0c-0305e82c3301"
      selector:
        text:
